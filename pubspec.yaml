name: food_delivery
description: "Crave — Food Delivery App (FYP)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Fonts
  google_fonts: ^8.1.0

  # UI Animations / Intro
  loading_animation_widget: ^1.3.0
  smooth_page_indicator: ^2.0.1
  animated_toggle_switch: ^0.8.7

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Authentication (Supabase — handles tokens, sessions, deep linking)
  supabase_flutter: ^2.8.4

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Local Storage
  shared_preferences: ^2.3.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # SVG Icons
  flutter_svg: ^2.0.10+1

  # Formatting (dates, numbers)
  intl: ^0.19.0

  # Skeleton Loading
  shimmer: ^3.0.0

  # Spacing Utility
  gap: ^3.0.1

  # Map (OpenStreetMap — free, no API key needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # AI Chatbot (Gemini)
  google_generative_ai: ^0.4.6

  # Payments (Stripe)
  flutter_stripe: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
